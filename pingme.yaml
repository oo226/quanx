name: PingMe 自动化签到+视频奖励
desc: 自动抓取 PingMe 令牌并执行每日签到与视频翻倍任务。
author: 怎么肥事 (Converted by Gemini)

# 脚本配置
script:
  # 触发抓取参数：手动打开 App 余额页面即可触发
  - name: PingMe_Capture
    type: http-request
    match: ^https:\/\/api\.pingmeapp\.net\/app\/queryBalanceAndBonus
    script_url: https://raw.githubusercontent.com/oo226/quanx/main/.github/workflows/PingMe.js
    body_required: false
    update_interval: 86400

  # 定时签到：每天 08:30 和 20:30 执行
  - name: PingMe_Task
    type: cron
    cron: "30 8,20 * * *"
    script_url: https://raw.githubusercontent.com/oo226/quanx/main/.github/workflows/PingMe.js
    timeout: 60

# 主机解密
mitm:
  hostnames:
    - api.pingmeapp.net
