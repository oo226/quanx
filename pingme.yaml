name: PingMe 签到助手
desc: 自动抓取并执行每日签到
author: 怎么肥事 (Adapted for Egern)

# --- 注意下面的缩进，不要有多余空格 ---
script:
  - name: PingMe_Capture
    type: http-request
    match: ^https:\/\/api\.pingmeapp\.net\/app\/queryBalanceAndBonus
    script_url: https://raw.githubusercontent.com/oo226/quanx/main/.github/workflows/cook.js
    body_required: false
    update_interval: 0

  - name: PingMe_Task
    type: cron
    cron: "30 8,20 * * *"
    script_url: https://raw.githubusercontent.com/oo226/quanx/main/.github/workflows/PingMe.js
    timeout: 300
    update_interval: 0

mitm:
  hostnames:
    - api.pingmeapp.net
