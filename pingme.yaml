name: PingMe 签到助手
description: 自动抓取 PingMe 令牌并执行每日签到及视频翻倍任务。
author: 怎么肥事 (Adapted for Egern)
homepage: https://github.com/oo226/quanx
icon: https://raw.githubusercontent.com/oo226/quanx/main/icon.png
dns: {}

# --- 核心修改：使用 scriptings 关键字 ---
scriptings:
  - http_request:
      name: PingMe_Capture
      match: ^https:\/\/api\.pingmeapp\.net\/app\/queryBalanceAndBonus
      script_url: https://raw.githubusercontent.com/oo226/quanx/main/.github/workflows/cook.js
      body_required: false
      timeout: 60

  - cron:
      name: PingMe_Cron
      cron: "30 8,20 * * *"
      script_url: https://raw.githubusercontent.com/oo226/quanx/main/.github/workflows/PingMe.js
      timeout: 300

# --- 域名解密 ---
mitm:
  hostnames:
    - api.pingmeapp.net
